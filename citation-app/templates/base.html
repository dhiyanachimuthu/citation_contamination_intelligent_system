<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citation Contamination Intelligence System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3250;
      --text: #e2e8f0;
      --muted: #8892a4;
      --primary: #4f8ef7;
      --primary-dark: #3b72d9;
      --red: #e53e3e;
      --red-soft: #2d1515;
      --orange: #ed8936;
      --orange-soft: #2d1e0c;
      --yellow: #ecc94b;
      --yellow-soft: #2a2208;
      --green: #48bb78;
      --green-soft: #0e2318;
      --blue-soft: #0e1a33;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 8px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 1.2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    .topbar-logo { font-weight: 700; font-size: 1rem; color: var(--text); letter-spacing: -0.01em; }
    .topbar-logo span { color: var(--primary); }
    .topbar-sub { font-size: 0.75rem; color: var(--muted); }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 1rem; }

    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.4rem; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-block { width: 100%; justify-content: center; }

    .input { width: 100%; padding: 0.65rem 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.15s; font-family: var(--mono); }
    .input:focus { border-color: var(--primary); }
    .input::placeholder { color: var(--muted); font-family: var(--font); }
    .input-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } .grid-4 { grid-template-columns: 1fr 1fr; } }

    .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.2rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.2rem; }

    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-red    { background: var(--red-soft);    color: var(--red);    border: 1px solid #5a1a1a; }
    .badge-orange { background: var(--orange-soft); color: var(--orange); border: 1px solid #5a3010; }
    .badge-yellow { background: var(--yellow-soft); color: var(--yellow); border: 1px solid #5a4a10; }
    .badge-green  { background: var(--green-soft);  color: var(--green);  border: 1px solid #0e4020; }
    .badge-blue   { background: var(--blue-soft);   color: var(--primary);border: 1px solid #1a2a5a; }

    .alert { padding: 0.9rem 1.2rem; border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .alert-error   { background: var(--red-soft);    border: 1px solid #5a1a1a; color: #fc8181; }
    .alert-warning { background: var(--orange-soft); border: 1px solid #5a3010; color: #f6ad55; }
    .alert-info    { background: var(--blue-soft);   border: 1px solid #1a2a5a; color: #90cdf4; }
    .alert-success { background: var(--green-soft);  border: 1px solid #0e4020; color: #9ae6b4; }

    .legend { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .section-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--surface2); padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; white-space: nowrap; }
    td { padding: 0.7rem 1rem; border-top: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: var(--surface2); }
    .doi-cell { font-family: var(--mono); font-size: 0.78rem; color: var(--primary); word-break: break-all; max-width: 180px; }
    .title-cell { max-width: 260px; }
    .null-val { color: var(--muted); font-style: italic; }

    /* Retraction panel */
    .retraction-panel { border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; border: 2px solid; }
    .retraction-panel.retracted { background: var(--red-soft); border-color: var(--red); }
    .retraction-panel.clean     { background: var(--green-soft); border-color: #276749; }
    .retraction-status { font-size: 1.4rem; font-weight: 700; }
    .retraction-meta   { margin-top: 0.8rem; display: flex; gap: 2rem; flex-wrap: wrap; }
    .retraction-meta-item label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.2rem; }
    .retraction-meta-item span  { font-weight: 600; font-size: 0.95rem; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 1.5rem; }

    /* Graph iframe */
    .graph-frame { width: 100%; height: 600px; border: none; border-radius: var(--radius); background: #1a202c; }

    /* Methodology box */
    details summary { cursor: pointer; font-weight: 600; color: var(--muted); font-size: 0.85rem; padding: 0.5rem 0; }
    details[open] summary { color: var(--text); }
    .method-body { margin-top: 0.8rem; font-size: 0.85rem; color: var(--muted); line-height: 1.8; }
    .method-body code { background: var(--surface2); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: var(--mono); color: var(--primary); font-size: 0.82rem; }

    .form-row { display: flex; gap: 1rem; align-items: flex-end; }
    .form-row .grow { flex: 1; }
    @media (max-width: 600px) { .form-row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">Citation <span>Contamination</span> Intelligence System</div>
    <div class="topbar-sub">Real data only &mdash; OpenCitations &bull; Semantic Scholar &bull; Retraction Watch</div>
  </div>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
