{% extends "base.html" %}
{% block content %}
<div style="max-width:540px; margin:3rem auto 0; text-align:center;">
  <div class="card">
    <!-- Animated ring spinner -->
    <div style="display:flex; justify-content:center; margin-bottom:1.5rem;">
      <div style="width:56px; height:56px; border:4px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.9s linear infinite;"></div>
    </div>

    <h2 style="font-size:1.15rem; margin:0 0 0.5rem; font-weight:700;">Analyzing Citation Network</h2>
    <div style="font-family:var(--mono); font-size:0.82rem; background:var(--surface2); padding:0.5rem 1rem; border-radius:6px; color:var(--primary); margin:0.8rem 0 1.2rem; word-break:break-all;">{{ doi }}</div>

    <div id="step-msg" style="font-size:0.85rem; color:var(--muted); min-height:1.4em; line-height:1.6; margin-bottom:1.2rem;">Queued…</div>

    <!-- Progress dots -->
    <div id="progress-track" style="display:flex; gap:0.4rem; justify-content:center; margin-bottom:1.5rem;">
      {% for i in range(7) %}
      <div class="prog-dot" id="dot-{{ i }}" style="width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.3s;"></div>
      {% endfor %}
    </div>

    <div style="font-size:0.78rem; color:var(--muted); line-height:1.7;">
      Fetching real citation data from OpenCitations &amp; Semantic Scholar.<br>
      This typically takes <strong>30–120 seconds</strong> depending on citation volume.
    </div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const jobId   = "{{ job_id }}";
const stepEl  = document.getElementById("step-msg");
const dots    = Array.from({length: 7}, (_, i) => document.getElementById("dot-" + i));
let dotIdx    = 0;

function lightDot(i) {
  dots.forEach((d, j) => {
    d.style.background = j <= i ? "var(--primary)" : "var(--border)";
  });
}

// Advance dot every 12 seconds max
const dotTimer = setInterval(() => {
  if (dotIdx < dots.length - 1) {
    dotIdx++;
    lightDot(dotIdx);
  }
}, 12000);

async function poll() {
  try {
    const res  = await fetch("/job/" + jobId + "/status");
    const data = await res.json();

    if (data.step) stepEl.textContent = data.step;

    if (data.status === "done") {
      clearInterval(dotTimer);
      lightDot(dots.length - 1);
      stepEl.textContent = "Done! Loading results…";
      setTimeout(() => { window.location.href = "/job/" + jobId + "/result"; }, 400);
    } else if (data.status === "error") {
      clearInterval(dotTimer);
      stepEl.textContent = "Analysis failed. Redirecting…";
      setTimeout(() => { window.location.href = "/job/" + jobId + "/result"; }, 1000);
    } else {
      setTimeout(poll, 2000);
    }
  } catch (e) {
    setTimeout(poll, 3000);
  }
}

lightDot(0);
setTimeout(poll, 1500);
</script>
{% endblock %}
